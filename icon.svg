<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Étude — Piano">
  <!-- Background tile, rounded corners, deep ink -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0c0907"/>

  <!-- Subtle warm glow upper-left -->
  <ellipse cx="170" cy="130" rx="240" ry="180" fill="#d4a049" opacity="0.10"/>

  <!-- Piano keys: 3 white + 2 black, anchored at the bottom -->
  <g transform="translate(96 296)">
    <!-- White keys -->
    <rect x="0"   y="0" width="100" height="184" rx="8" fill="#f1e6d0"/>
    <rect x="110" y="0" width="100" height="184" rx="8" fill="#f1e6d0"/>
    <rect x="220" y="0" width="100" height="184" rx="8" fill="#f1e6d0"/>
    <!-- Inner shadow at base of white keys -->
    <rect x="0"   y="166" width="100" height="18" rx="4" fill="#0a0805" opacity="0.18"/>
    <rect x="110" y="166" width="100" height="18" rx="4" fill="#0a0805" opacity="0.18"/>
    <rect x="220" y="166" width="100" height="18" rx="4" fill="#0a0805" opacity="0.18"/>
    <!-- Black keys -->
    <rect x="68"  y="0" width="60" height="118" rx="6" fill="#0a0805"/>
    <rect x="178" y="0" width="60" height="118" rx="6" fill="#0a0805"/>
    <!-- Brass top edge on black keys -->
    <rect x="68"  y="0" width="60" height="4" rx="2" fill="#d4a049" opacity="0.65"/>
    <rect x="178" y="0" width="60" height="4" rx="2" fill="#d4a049" opacity="0.65"/>
  </g>

  <!-- "É" italic monogram — solid brass, no gradient (raster-friendly) -->
  <text x="256" y="296"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="500"
        font-size="320"
        text-anchor="middle"
        fill="#e8b760">É</text>

  <!-- Inner highlight on É (subtle) -->
  <text x="252" y="292"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="500"
        font-size="320"
        text-anchor="middle"
        fill="#f0c578"
        opacity="0.55">É</text>

  <!-- Decorative brass border -->
  <rect x="6" y="6" width="500" height="500" rx="92" ry="92"
        fill="none" stroke="#d4a049" stroke-width="2" opacity="0.45"/>
</svg>
